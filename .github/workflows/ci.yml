name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install
        run: npm install

      - name: Build
        run: npm run build

      - name: Syntax check API
        run: |
          node --check apps/api/src/server.js
          node --check apps/api/src/db.js
          node --check apps/api/src/security.js

